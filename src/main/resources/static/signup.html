<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — LabourLink</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg-pattern"></div>
    <header class="navbar" id="navbar"></header>

    <div class="page-container" style="display: flex; align-items: center; justify-content: center; min-height: 85vh;">
        <div class="glass-card" style="max-width: 520px; width: 100%; padding: 40px; animation: fadeUp 0.5s ease;">
            <div style="text-align: center; margin-bottom: 32px;">
                <div style="font-size: 3rem; margin-bottom: 8px;">🏗️</div>
                <h1 style="font-size: 1.8rem; font-weight: 800;" data-i18n="join_labourlink">Join LabourLink</h1>
                <p style="color: var(--text-muted);" data-i18n="create_profile">Create your verified professional profile</p>
            </div>

            <!-- Role Selector -->
            <div class="role-selector" id="roleSelector">
                <div class="role-option" onclick="selectRole('WORKER')" id="roleWorker">
                    <div class="role-icon">👷</div>
                    <div class="role-name" data-i18n="im_worker">Worker</div>
                </div>
                <div class="role-option" onclick="selectRole('CONTRACTOR')" id="roleContractor">
                    <div class="role-icon">🏢</div>
                    <div class="role-name" data-i18n="im_contractor">Contractor</div>
                </div>
            </div>

            <form onsubmit="handleSignup(event)" id="signupForm">
                <input type="hidden" id="selectedRole" value="">
                <div class="form-group">
                    <label data-i18n="full_name">Full Name *</label>
                    <input type="text" id="name" class="form-input" data-i18n="full_name" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <label data-i18n="phone_number">Phone Number *</label>
                    <input type="tel" id="phone" class="form-input" placeholder="10-digit number" required pattern="[0-9]{10}">
                </div>
                <div class="form-group">
                    <label data-i18n="password">Password *</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 4 characters" required minlength="4">
                </div>
                <div class="form-group">
                    <label data-i18n="city">City *</label>
                    <select id="city" class="form-input" required>
                        <option value="" data-i18n="select_city">Select your city</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Pune">Pune</option>
                        <option value="Hyderabad">Hyderabad</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Kolkata">Kolkata</option>
                        <option value="Ahmedabad">Ahmedabad</option>
                        <option value="Jaipur">Jaipur</option>
                        <option value="Nagpur">Nagpur</option>
                        <option value="Surat">Surat</option>
                        <option value="Nashik">Nashik</option>
                    </select>
                </div>

                <!-- Worker-specific -->
                <div class="form-group" id="skillGroup" style="display: none;">
                    <label data-i18n="primary_skill">Primary Skill *</label>
                    <select id="skill" class="form-input">
                        <option value="" data-i18n="select_skill">Select your skill</option>
                        <option value="MASON">🧱 Mason</option>
                        <option value="ELECTRICIAN">⚡ Electrician</option>
                        <option value="PAINTER">🎨 Painter</option>
                        <option value="LABOURER">💪 Labourer</option>
                        <option value="PLUMBER">🔧 Plumber</option>
                        <option value="CARPENTER">🪚 Carpenter</option>
                        <option value="WELDER">🔥 Welder</option>
                        <option value="TILE_FITTER">🔲 Tile Fitter</option>
                        <option value="ROD_BINDER">🏗️ Rod Binder</option>
                        <option value="HELPER">🤝 Helper</option>
                    </select>
                </div>

                <!-- Contractor-specific -->
                <div class="form-group" id="companyGroup" style="display: none;">
                    <label data-i18n="company_name">Company Name (Optional)</label>
                    <input type="text" id="companyName" class="form-input" placeholder="e.g. RK Constructions">
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;" id="signupBtn" data-i18n="create_account">
                    Create Account
                </button>
            </form>

            <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                <span data-i18n="already_have_account">Already have an account?</span>
                <a href="/login.html" data-i18n="login_here">Login here</a>
            </p>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let selectedRole = '';

        document.addEventListener('DOMContentLoaded', () => {
            renderNavbar('signup');
            // Pre-select role from URL param
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role');
            if (role === 'WORKER' || role === 'CONTRACTOR') selectRole(role);
        });

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('selectedRole').value = role;
            document.getElementById('roleWorker').classList.toggle('selected', role === 'WORKER');
            document.getElementById('roleContractor').classList.toggle('selected', role === 'CONTRACTOR');
            document.getElementById('skillGroup').style.display = role === 'WORKER' ? 'block' : 'none';
            document.getElementById('companyGroup').style.display = role === 'CONTRACTOR' ? 'block' : 'none';
            if (role === 'WORKER') document.getElementById('skill').required = true;
            else document.getElementById('skill').required = false;
        }

        async function handleSignup(e) {
            e.preventDefault();
            if (!selectedRole) { showToast('Please select Worker or Contractor', 'error'); return; }

            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.textContent = '...';

            const user = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value,
                city: document.getElementById('city').value,
                role: selectedRole,
                primarySkill: selectedRole === 'WORKER' ? document.getElementById('skill').value : null,
                companyName: selectedRole === 'CONTRACTOR' ? document.getElementById('companyName').value.trim() : null
            };

            const result = await api('/users/signup', { method: 'POST', body: user });

            if (result.success) {
                localStorage.setItem('user', JSON.stringify(result.data));
                showToast('Account created! 🎉', 'success');
                setTimeout(() => {
                    window.location.href = result.data.role === 'WORKER' ? '/worker-dashboard.html' : '/contractor-dashboard.html';
                }, 500);
            } else {
                showToast(result.message || 'Signup failed', 'error');
                btn.disabled = false;
                btn.textContent = t('create_account');
            }
        }
    </script>
</body>
</html>
