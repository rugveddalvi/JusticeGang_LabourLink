<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractor Dashboard — LabourLink</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .dashboard-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; animation: fadeUp 0.5s ease; }
        .welcome-text h2 { font-size: 1.8rem; font-weight: 700; }
        .welcome-text p { color: var(--text-muted); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeUp 0.4s ease; }
        .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        .job-title { font-weight: 600; font-size: 1.12rem; }
        .job-meta { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; align-items: center; }
        .job-meta-item { display: flex; align-items: center; gap: 5px; color: var(--text-secondary); font-size: 0.88rem; }
        .applicant-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 12px; transition: all 0.3s; }
        .applicant-card:hover { border-color: rgba(255,107,53,0.2); }
        .applicant-info { display: flex; align-items: center; gap: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } .jobs-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <header class="navbar" id="navbar"></header>

    <div class="page-container">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="avatar avatar-lg" style="background: var(--gradient-accent);" id="userAvatar">?</div>
            <div class="welcome-text">
                <h2 id="welcomeMsg"><span data-i18n="welcome">Welcome</span>! 🏢</h2>
                <p id="userMeta">Loading...</p>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid-4 mb-3" id="statsGrid" style="animation: fadeUp 0.5s ease 0.15s both;"></div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('myjobs')" data-i18n="my_jobs">📋 My Jobs</button>
            <button class="tab" onclick="switchTab('postjob')" data-i18n="post_job">➕ Post Job</button>
            <button class="tab" onclick="switchTab('history')" data-i18n="work_history">📜 Work History</button>
            <button class="tab" onclick="switchTab('workers')" data-i18n="browse_workers">👷 Browse Workers</button>
            <button class="tab" onclick="switchTab('favorites')" data-i18n="favorites">❤️ Favorites</button>
        </div>

        <!-- Tab: My Jobs -->
        <div class="tab-content active" id="tab-myjobs"><div class="jobs-grid" id="myJobsList"></div></div>

        <!-- Tab: Post Job -->
        <div class="tab-content" id="tab-postjob">
            <div class="glass-card" style="max-width: 700px; padding: 36px;">
                <h2 style="font-weight: 700; margin-bottom: 24px;">📝 <span data-i18n="post_new_job">Post a New Job</span></h2>
                <form onsubmit="handlePostJob(event)">
                    <div class="form-group">
                        <label data-i18n="job_title">Job Title *</label>
                        <input type="text" id="jobTitle" class="form-input" placeholder="e.g. Villa construction - Mason work" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="skill_required">Skill Required *</label>
                            <select id="jobSkill" class="form-input" required>
                                <option value="">Select</option>
                                <option value="MASON">🧱 Mason</option><option value="ELECTRICIAN">⚡ Electrician</option>
                                <option value="PAINTER">🎨 Painter</option><option value="LABOURER">💪 Labourer</option>
                                <option value="PLUMBER">🔧 Plumber</option><option value="CARPENTER">🪚 Carpenter</option>
                                <option value="WELDER">🔥 Welder</option><option value="TILE_FITTER">🔲 Tile Fitter</option>
                                <option value="ROD_BINDER">🏗️ Rod Binder</option><option value="HELPER">🤝 Helper</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label data-i18n="location">Location *</label>
                            <select id="jobLocation" class="form-input" required>
                                <option value="">Select</option>
                                <option value="Mumbai">Mumbai</option><option value="Delhi">Delhi</option>
                                <option value="Bangalore">Bangalore</option><option value="Pune">Pune</option>
                                <option value="Hyderabad">Hyderabad</option><option value="Chennai">Chennai</option>
                                <option value="Kolkata">Kolkata</option><option value="Ahmedabad">Ahmedabad</option>
                                <option value="Nagpur">Nagpur</option><option value="Nashik">Nashik</option>
                                <option value="Surat">Surat</option><option value="Jaipur">Jaipur</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label data-i18n="description">Description</label>
                        <textarea id="jobDesc" class="form-input" rows="3" placeholder="Job details..." style="resize: vertical;"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label data-i18n="daily_rate">Daily Rate (₹) *</label><input type="number" id="jobRate" class="form-input" placeholder="800" required min="100"></div>
                        <div class="form-group"><label data-i18n="duration_days">Duration (Days) *</label><input type="number" id="jobDuration" class="form-input" placeholder="10" required min="1"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label data-i18n="workers_needed">Workers Needed *</label><input type="number" id="jobWorkers" class="form-input" placeholder="3" required min="1"></div>
                        <div class="form-group"><label data-i18n="start_date">Start Date</label><input type="date" id="jobStartDate" class="form-input"></div>
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; gap: 12px;">
                        <input type="checkbox" id="jobUrgent" style="width: 20px; height: 20px; accent-color: var(--danger);">
                        <label style="margin: 0; cursor: pointer;" for="jobUrgent" data-i18n="mark_urgent">🔥 Mark as URGENT</label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 12px;" id="postJobBtn" data-i18n="post_job">Post Job</button>
                </form>
            </div>
        </div>

        <!-- Tab: Work History -->
        <div class="tab-content" id="tab-history"><div id="historyList"></div></div>

        <!-- Tab: Browse Workers -->
        <div class="tab-content" id="tab-workers">
            <div class="filter-bar" style="margin-bottom: 20px;">
                <select id="workerFilterSkill" class="form-input" style="max-width: 200px;" onchange="loadWorkers()">
                    <option value="">All Skills</option>
                    <option value="MASON">🧱 Mason</option><option value="ELECTRICIAN">⚡ Electrician</option>
                    <option value="PAINTER">🎨 Painter</option><option value="PLUMBER">🔧 Plumber</option>
                </select>
            </div>
            <div class="jobs-grid" id="workersList"></div>
        </div>

        <!-- Tab: Favorites -->
        <div class="tab-content" id="tab-favorites"><div class="jobs-grid" id="favoritesList"></div></div>
    </div>

    <!-- Applicants Modal -->
    <div class="modal-overlay" id="applicantsModal">
        <div class="modal" style="max-width: 650px;">
            <div class="modal-header"><h2>👷 Applicants</h2><button class="modal-close" onclick="closeModal('applicantsModal')">✕</button></div>
            <div id="applicantsList"></div>
        </div>
    </div>

    <!-- Complete Job Modal (with Photos) -->
    <div class="modal-overlay" id="completeModal">
        <div class="modal">
            <div class="modal-header"><h2>✅ Complete Job</h2><button class="modal-close" onclick="closeModal('completeModal')">✕</button></div>
            <input type="hidden" id="completeJobId">
            <p style="color: var(--text-secondary); margin-bottom: 16px;">Upload photos as evidence of completed work (optional, max 2).</p>
            <div class="photo-upload-area" id="photoUploadArea">
                <div style="font-size: 2rem; margin-bottom: 8px;">📸</div>
                <div data-i18n="upload_photos">Upload Photos (max 2)</div>
                <input type="file" id="completionPhotos" accept="image/*" multiple onchange="previewPhotos(this)">
            </div>
            <div class="photo-preview" id="photoPreview"></div>
            <button class="btn btn-accent" style="width: 100%; margin-top: 16px;" onclick="submitCompletion()" id="completeBtn">✅ Mark as Complete</button>
        </div>
    </div>

    <!-- Rate Worker Modal -->
    <div class="modal-overlay" id="rateModal">
        <div class="modal">
            <div class="modal-header"><h2>⭐ <span data-i18n="rate_worker">Rate Worker</span></h2><button class="modal-close" onclick="closeModal('rateModal')">✕</button></div>
            <input type="hidden" id="rateWorkHistoryId">
            <div style="text-align: center; margin: 16px 0;">
                <div id="rateStars" style="font-size: 2.5rem; cursor: pointer;">
                    <span class="star" data-value="1" onclick="setRating(1)">★</span><span class="star" data-value="2" onclick="setRating(2)">★</span>
                    <span class="star" data-value="3" onclick="setRating(3)">★</span><span class="star" data-value="4" onclick="setRating(4)">★</span>
                    <span class="star" data-value="5" onclick="setRating(5)">★</span>
                </div>
            </div>
            <div class="form-group"><label>Note</label><input type="text" id="rateNote" class="form-input" placeholder="e.g. Excellent work"></div>
            <button class="btn btn-primary" style="width: 100%;" onclick="submitWorkerRating()" data-i18n="submit_rating">Submit Rating</button>
        </div>
    </div>

    <!-- Endorse Modal -->
    <div class="modal-overlay" id="endorseModal">
        <div class="modal">
            <div class="modal-header"><h2>🏷️ <span data-i18n="add_endorsement">Add Endorsement</span></h2><button class="modal-close" onclick="closeModal('endorseModal')">✕</button></div>
            <input type="hidden" id="endorseWorkHistoryId">
            <div class="form-group"><label>Skill Tag</label><input type="text" id="endorseSkillTag" class="form-input" placeholder="e.g. Expert Brickwork"></div>
            <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;">
                <button type="button" class="btn btn-sm btn-secondary" onclick="document.getElementById('endorseSkillTag').value='Expert Brickwork'">Expert Brickwork</button>
                <button type="button" class="btn btn-sm btn-secondary" onclick="document.getElementById('endorseSkillTag').value='Fast Worker'">Fast Worker</button>
                <button type="button" class="btn btn-sm btn-secondary" onclick="document.getElementById('endorseSkillTag').value='Neat Finish'">Neat Finish</button>
                <button type="button" class="btn btn-sm btn-secondary" onclick="document.getElementById('endorseSkillTag').value='Punctual'">Punctual</button>
                <button type="button" class="btn btn-sm btn-secondary" onclick="document.getElementById('endorseSkillTag').value='Safety Conscious'">Safety Conscious</button>
            </div>
            <button class="btn btn-accent" style="width: 100%;" onclick="submitEndorsement()" data-i18n="submit">Submit</button>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const user = requireAuth();
        if (user && user.role !== 'CONTRACTOR') window.location.href = '/worker-dashboard.html';
        let currentRating = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            renderNavbar('dashboard');
            if (!user) return;
            document.getElementById('userAvatar').textContent = getInitials(user.name);
            document.getElementById('welcomeMsg').innerHTML = `${t('welcome')}, ${user.name}! 🏢`;
            document.getElementById('userMeta').textContent = `${user.companyName || 'Independent Contractor'} • ${user.city} • Rating: ${user.contractorRating || 0}/5`;
            await Promise.all([loadStats(), loadMyJobs()]);
        });

        async function loadStats() {
            const jobsRes = await api(`/jobs/contractor/${user.id}`);
            const jobs = jobsRes.success ? jobsRes.data : [];
            const open = jobs.filter(j => j.status === 'OPEN').length;
            const ongoing = jobs.filter(j => j.status === 'ONGOING').length;
            const completed = jobs.filter(j => j.status === 'COMPLETED').length;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-icon" style="background: rgba(16,185,129,0.12);">📋</div><div class="stat-value" style="color: #34D399;">${open}</div><div class="stat-label" data-i18n="open_jobs">Open Jobs</div></div>
                <div class="stat-card"><div class="stat-icon" style="background: rgba(255,184,0,0.12);">🔨</div><div class="stat-value" style="color: #FBBF24;">${ongoing}</div><div class="stat-label" data-i18n="ongoing_jobs">Ongoing Jobs</div></div>
                <div class="stat-card"><div class="stat-icon" style="background: rgba(99,102,241,0.12);">✅</div><div class="stat-value" style="color: #818CF8;">${completed}</div><div class="stat-label" data-i18n="completed">Completed</div></div>
                <div class="stat-card"><div class="stat-icon" style="background: rgba(255,107,53,0.12);">⭐</div><div class="stat-value" style="color: var(--primary);">${jobs.length}</div><div class="stat-label" data-i18n="total_jobs_posted">Total Jobs</div></div>
            `;
            applyTranslations();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const map = { myjobs: 0, postjob: 1, history: 2, workers: 3, favorites: 4 };
            const tabs = document.querySelectorAll('.tab');
            if (map[tabName] !== undefined && tabs[map[tabName]]) tabs[map[tabName]].classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            if (tabName === 'history') loadHistory();
            if (tabName === 'workers') loadWorkers();
            if (tabName === 'favorites') loadFavorites();
        }

        // ===== My Jobs =====
        async function loadMyJobs() {
            const result = await api(`/jobs/contractor/${user.id}`);
            const jobs = result.success ? result.data : [];
            if (jobs.length === 0) {
                document.getElementById('myJobsList').innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><div class="empty-icon">📋</div><h3 data-i18n="no_jobs_posted">No jobs posted yet</h3></div>`;
                applyTranslations(); return;
            }
            document.getElementById('myJobsList').innerHTML = jobs.map(job => `
                <div class="job-card">
                    ${job.urgentFlag ? '<div class="urgent-badge">🔥 URGENT</div>' : ''}
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;"><div class="job-title">${job.title}</div>${statusBadge(job.status)}</div>
                    <div class="job-meta">${skillDisplay(job.skillRequired)}<span class="job-meta-item">📍 ${job.location}</span></div>
                    <div class="job-meta"><span class="job-meta-item">💰 ${formatCurrency(job.dailyRate)}/day</span><span class="job-meta-item">⏱️ ${job.durationDays || '?'} days</span><span class="job-meta-item">👷 ${job.numberOfWorkersNeeded} needed</span></div>
                    <div style="display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--glass-border); flex-wrap: wrap;">
                        ${job.status === 'OPEN' || job.status === 'ONGOING' ? `<button class="btn btn-sm btn-primary" onclick="viewApplicants(${job.id})" data-i18n="view_applicants">👷 Applicants</button>` : ''}
                        ${job.status === 'ONGOING' ? `<button class="btn btn-sm btn-accent" onclick="openCompleteModal(${job.id})">✅ ${t('mark_complete')}</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // ===== Post Job =====
        async function handlePostJob(e) {
            e.preventDefault();
            const btn = document.getElementById('postJobBtn');
            btn.disabled = true; btn.textContent = '...';
            const job = {
                contractorId: user.id,
                title: document.getElementById('jobTitle').value.trim(),
                skillRequired: document.getElementById('jobSkill').value,
                location: document.getElementById('jobLocation').value,
                description: document.getElementById('jobDesc').value.trim(),
                dailyRate: parseFloat(document.getElementById('jobRate').value),
                durationDays: parseInt(document.getElementById('jobDuration').value),
                numberOfWorkersNeeded: parseInt(document.getElementById('jobWorkers').value),
                startDate: document.getElementById('jobStartDate').value || null,
                urgentFlag: document.getElementById('jobUrgent').checked
            };
            const result = await api('/jobs', { method: 'POST', body: job });
            if (result.success) {
                showToast('Job posted! 🎉' + (job.urgentFlag ? ' Urgent notifications sent to workers!' : ''), 'success');
                e.target.reset();
                switchTab('myjobs'); loadMyJobs(); loadStats();
            } else { showToast(result.message || 'Failed', 'error'); }
            btn.disabled = false; btn.textContent = t('post_job');
        }

        // ===== Applicants =====
        async function viewApplicants(jobId) {
            const result = await api(`/jobs/${jobId}/applications`);
            const apps = result.success ? result.data : [];
            if (apps.length === 0) {
                document.getElementById('applicantsList').innerHTML = `<div class="empty-state"><div class="empty-icon">👷</div><h3>No applicants yet</h3></div>`;
            } else {
                document.getElementById('applicantsList').innerHTML = apps.map(app => `
                    <div class="applicant-card">
                        <div class="applicant-info">
                            <div class="avatar">${getInitials(app.workerName)}</div>
                            <div>
                                <div style="font-weight: 600;">${app.workerName || 'Worker'}</div>
                                <div style="color: var(--text-muted); font-size: 0.82rem;">${skillDisplay(app.workerSkill)} • ${renderStars(app.workerRating)} ${(app.workerRating || 0).toFixed(1)} • 📞 ${app.workerPhone || 'N/A'}</div>
                            </div>
                        </div>
                        <div style="display: flex; gap: 6px; align-items: center;">
                            ${app.status === 'APPLIED' ? `
                                <button class="btn btn-sm btn-accent" onclick="selectWorker(${app.id})" data-i18n="select_worker">✅ Select</button>
                                <button class="btn btn-sm btn-danger" onclick="rejectWorker(${app.id})">❌</button>
                                <button class="btn btn-sm btn-secondary" onclick="addFavorite(${app.workerId})" title="Add to favorites">❤️</button>
                            ` : statusBadge(app.status)}
                        </div>
                    </div>
                `).join('');
            }
            openModal('applicantsModal');
        }

        async function selectWorker(applicationId) {
            const result = await api(`/jobs/applications/${applicationId}/select`, { method: 'POST' });
            if (result.success) { showToast('Worker selected! ✅', 'success'); viewApplicants(result.data.jobId); loadMyJobs(); loadStats(); }
            else showToast(result.message, 'error');
        }
        async function rejectWorker(applicationId) {
            const result = await api(`/jobs/applications/${applicationId}/reject`, { method: 'POST' });
            if (result.success) { showToast('Rejected', 'warning'); viewApplicants(result.data.jobId); }
            else showToast(result.message, 'error');
        }

        // ===== Complete Job with Photos =====
        function openCompleteModal(jobId) {
            document.getElementById('completeJobId').value = jobId;
            document.getElementById('completionPhotos').value = '';
            document.getElementById('photoPreview').innerHTML = '';
            openModal('completeModal');
        }

        function previewPhotos(input) {
            const preview = document.getElementById('photoPreview');
            preview.innerHTML = '';
            for (let i = 0; i < Math.min(input.files.length, 2); i++) {
                const url = URL.createObjectURL(input.files[i]);
                preview.innerHTML += `<img src="${url}" class="photo-thumb">`;
            }
        }

        async function submitCompletion() {
            const btn = document.getElementById('completeBtn');
            btn.disabled = true; btn.textContent = 'Uploading...';
            const jobId = document.getElementById('completeJobId').value;
            const fileInput = document.getElementById('completionPhotos');

            let photoUrls = '';
            if (fileInput.files.length > 0) {
                const urls = await uploadPhotos(fileInput);
                photoUrls = urls.join(',');
            }

            const result = await api(`/jobs/${jobId}/complete?contractorId=${user.id}${photoUrls ? '&photos=' + encodeURIComponent(photoUrls) : ''}`, { method: 'POST' });
            if (result.success) {
                showToast('Job completed! Workers notified. ✅', 'success');
                closeModal('completeModal'); loadMyJobs(); loadStats(); loadHistory();
            } else { showToast(result.message || 'Failed', 'error'); }
            btn.disabled = false; btn.textContent = '✅ Mark as Complete';
        }

        // ===== Work History =====
        async function loadHistory() {
            const result = await api(`/work-history/contractor/${user.id}`);
            const history = result.success ? result.data : [];
            if (history.length === 0) {
                document.getElementById('historyList').innerHTML = `<div class="empty-state"><div class="empty-icon">📜</div><h3 data-i18n="no_history">No completed jobs yet</h3></div>`;
                applyTranslations(); return;
            }
            document.getElementById('historyList').innerHTML = history.map(wh => `
                <div class="glass-card" style="margin-bottom: 16px;">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
                        <div>
                            <div style="font-weight: 600; font-size: 1.05rem;">${wh.jobTitle || 'Job #' + wh.jobId}</div>
                            <div style="color: var(--text-muted); font-size: 0.88rem; margin-top: 4px;">Worker: <strong>${wh.workerName}</strong> • ${skillDisplay(wh.skillUsed)} • 📍 ${wh.location || 'N/A'}</div>
                        </div>
                        <div style="font-size: 0.82rem; color: var(--text-muted);">${formatDate(wh.startDate)} — ${formatDate(wh.endDate)}</div>
                    </div>
                    ${wh.photos ? `<div class="photo-preview" style="margin-top: 12px;">${wh.photos.split(',').map(p => `<img src="${p}" class="photo-thumb-lg" onclick="window.open('${p}','_blank')">`).join('')}</div>` : ''}
                    <div style="display: flex; gap: 24px; margin-top: 14px; flex-wrap: wrap;">
                        <div>
                            <span style="color: var(--text-muted); font-size: 0.82rem;">You rated worker:</span>
                            ${wh.contractorRated ? `<div>${renderStars(wh.workerRating)} ${wh.workerRating}/5</div>` : `<div><button class="btn btn-sm btn-primary" onclick="openRateWorkerModal(${wh.id})">⭐ Rate</button></div>`}
                        </div>
                        <div>
                            <span style="color: var(--text-muted); font-size: 0.82rem;">Worker rated you:</span>
                            ${wh.workerRated ? `<div>${renderStars(wh.contractorRating)} ${wh.contractorRating}/5</div>` : '<div style="color: var(--text-muted);">Pending</div>'}
                        </div>
                    </div>
                    <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--glass-border); display: flex; gap: 8px;">
                        <button class="btn btn-sm btn-accent" onclick="openEndorseModal(${wh.id})">🏷️ Endorse</button>
                        <a href="/worker-profile.html?id=${wh.workerId}" class="btn btn-sm btn-secondary">👤 Profile</a>
                        <button class="btn btn-sm btn-secondary" onclick="addFavorite(${wh.workerId})">❤️ Favorite</button>
                    </div>
                </div>
            `).join('');
        }

        // ===== Browse Workers =====
        async function loadWorkers() {
            const skill = document.getElementById('workerFilterSkill').value;
            let url = '/users/workers?';
            if (skill) url += `skill=${skill}&`;
            const result = await api(url);
            const workers = result.success ? result.data : [];
            if (workers.length === 0) {
                document.getElementById('workersList').innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">👷</div><h3>No workers found</h3></div>`;
                return;
            }
            document.getElementById('workersList').innerHTML = workers.map(w => `
                <div class="job-card">
                    <div style="display: flex; gap: 14px; align-items: center; margin-bottom: 12px;">
                        <div class="avatar">${getInitials(w.name)}</div>
                        <div><div style="font-weight: 600;">${w.name}</div><div style="color: var(--text-muted); font-size: 0.82rem;">📍 ${w.city || 'N/A'}</div></div>
                    </div>
                    <div class="job-meta">${skillDisplay(w.primarySkill)}<span class="job-meta-item">${renderStars(w.averageRating)} ${(w.averageRating || 0).toFixed(1)}</span></div>
                    <div style="display: flex; gap: 8px; margin-top: 12px;">
                        <a href="/worker-profile.html?id=${w.id}" class="btn btn-sm btn-primary">👤 Profile</a>
                        <button class="btn btn-sm btn-secondary" onclick="addFavorite(${w.id})">❤️ Favorite</button>
                    </div>
                </div>
            `).join('');
        }

        // ===== Favorites =====
        async function loadFavorites() {
            const result = await api(`/favorites/${user.id}`);
            const favs = result.success ? result.data : [];
            if (favs.length === 0) {
                document.getElementById('favoritesList').innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">❤️</div><h3>No favorites yet</h3><p>Add workers to favorites from the applicants list or Browse Workers tab.</p></div>`;
                return;
            }
            document.getElementById('favoritesList').innerHTML = favs.map(f => `
                <div class="job-card">
                    <div style="display: flex; gap: 14px; align-items: center; margin-bottom: 12px;">
                        <div class="avatar">${getInitials(f.workerName)}</div>
                        <div><div style="font-weight: 600;">${f.workerName}</div></div>
                    </div>
                    <div style="display: flex; gap: 8px; margin-top: 12px;">
                        <a href="/worker-profile.html?id=${f.workerId}" class="btn btn-sm btn-primary">👤 Profile</a>
                        <button class="btn btn-sm btn-danger" onclick="removeFavorite(${f.workerId})">Remove</button>
                    </div>
                </div>
            `).join('');
        }
        async function addFavorite(workerId) {
            const result = await api(`/favorites?contractorId=${user.id}&workerId=${workerId}`, { method: 'POST' });
            if (result.success) showToast('Added to favorites! ❤️', 'success');
            else showToast(result.message || 'Failed', 'error');
        }
        async function removeFavorite(workerId) {
            const result = await api(`/favorites?contractorId=${user.id}&workerId=${workerId}`, { method: 'DELETE' });
            if (result.success) { showToast('Removed', 'info'); loadFavorites(); }
        }

        // ===== Rate & Endorse =====
        function openRateWorkerModal(whId) { document.getElementById('rateWorkHistoryId').value = whId; currentRating = 0; updateStarUI(); document.getElementById('rateNote').value = ''; openModal('rateModal'); }
        function setRating(val) { currentRating = val; updateStarUI(); }
        function updateStarUI() { document.querySelectorAll('#rateStars .star').forEach(s => s.classList.toggle('filled', parseInt(s.dataset.value) <= currentRating)); }
        async function submitWorkerRating() {
            if (currentRating === 0) { showToast('Select a rating', 'error'); return; }
            const result = await api('/work-history/rate-worker', { method: 'POST', body: { workHistoryId: parseInt(document.getElementById('rateWorkHistoryId').value), raterId: user.id, rating: currentRating, note: document.getElementById('rateNote').value.trim() } });
            if (result.success) { showToast('Rated! 🙏', 'success'); closeModal('rateModal'); loadHistory(); } else showToast(result.message, 'error');
        }
        function openEndorseModal(whId) { document.getElementById('endorseWorkHistoryId').value = whId; document.getElementById('endorseSkillTag').value = ''; openModal('endorseModal'); }
        async function submitEndorsement() {
            const tag = document.getElementById('endorseSkillTag').value.trim();
            if (!tag) { showToast('Enter a skill tag', 'error'); return; }
            const result = await api('/work-history/endorse', { method: 'POST', body: { workHistoryId: parseInt(document.getElementById('endorseWorkHistoryId').value), contractorId: user.id, skillTag: tag } });
            if (result.success) { showToast('Endorsed! 🏷️', 'success'); closeModal('endorseModal'); } else showToast(result.message, 'error');
        }
    </script>
</body>
</html>
