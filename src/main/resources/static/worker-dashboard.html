<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard — LabourLink</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .welcome-bar { display: flex; align-items: center; gap: 18px; margin-bottom: 26px; animation: fadeUp 0.5s ease; flex-wrap: wrap; }
        .welcome-bar h2 { font-size: 1.6rem; font-weight: 700; }
        .welcome-bar p { color: var(--text-muted); font-size: 0.88rem; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeUp 0.35s ease; }
        .urgent-jobs-banner { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 22px; animation: fadeUp 0.5s ease 0.3s both; }
        .urgent-jobs-banner h3 { font-size: 1rem; font-weight: 700; color: var(--danger); margin-bottom: 8px; }
    </style>
</head>
<body>
    <header class="navbar" id="navbar"></header>

    <div class="page-container">
        <!-- Welcome Bar -->
        <div class="welcome-bar">
            <div class="avatar avatar-lg" style="background: var(--gradient-accent);" id="userAvatar">?</div>
            <div>
                <h2 id="welcomeMsg"><span data-i18n="welcome">Welcome</span>! 👋</h2>
                <p id="userMeta">Loading...</p>
            </div>
        </div>

        <!-- ===== SIMPLIFIED DASHBOARD GRID ===== -->
        <div class="dashboard-grid" id="dashGrid" style="animation: fadeUp 0.5s ease 0.15s both;">
            <a class="dashboard-card" onclick="switchTab('browse')">
                <div class="card-icon">🔍</div>
                <div class="card-title" data-i18n="find_jobs">Find Jobs</div>
            </a>
            <a class="dashboard-card" onclick="switchTab('applications')">
                <div class="card-icon">📋</div>
                <div class="card-title" data-i18n="my_jobs">My Jobs</div>
                <span class="card-badge" id="appsBadge" style="display: none;">0</span>
            </a>
            <a class="dashboard-card" onclick="switchTab('history')">
                <div class="card-icon">📜</div>
                <div class="card-title" data-i18n="work_history">Work History</div>
            </a>
            <a class="dashboard-card" onclick="window.location.href='/worker-profile.html?id=' + user.id">
                <div class="card-icon">👤</div>
                <div class="card-title" data-i18n="profile">My Profile</div>
            </a>
            <button class="dashboard-card" onclick="toggleVoice()">
                <div class="card-icon">🎤</div>
                <div class="card-title" data-i18n="voice_assistant">Voice Assistant</div>
            </button>
            <button class="dashboard-card" onclick="toggleNotifPanel()">
                <div class="card-icon">🔔</div>
                <div class="card-title" data-i18n="notifications">Notifications</div>
                <span class="card-badge" id="notifCardBadge" style="display: none;">0</span>
            </button>
        </div>

        <!-- Stats Bar -->
        <div class="grid-4 mb-3" id="statsGrid" style="animation: fadeUp 0.5s ease 0.25s both;"></div>

        <!-- Urgent Jobs Banner -->
        <div class="urgent-jobs-banner" id="urgentBanner" style="display: none;">
            <h3>🔥 <span data-i18n="feature_urgent">Urgent Jobs Near You</span></h3>
            <div id="urgentJobsList"></div>
        </div>

        <!-- Tabs (compact) -->
        <div class="tabs" id="tabBar" style="display: none;">
            <button class="tab active" onclick="switchTab('browse')" data-i18n="find_jobs">🔍 Find Jobs</button>
            <button class="tab" onclick="switchTab('applications')" data-i18n="my_jobs">📋 My Jobs</button>
            <button class="tab" onclick="switchTab('history')" data-i18n="work_history">📜 History</button>
        </div>

        <!-- Tab: Browse Jobs -->
        <div class="tab-content" id="tab-browse">
            <div class="filter-bar">
                <select id="filterSkill" class="form-input" style="max-width: 170px;" onchange="loadJobs()">
                    <option value="" data-i18n="all_skills">All Skills</option>
                    <option value="MASON">🧱 Mason</option><option value="ELECTRICIAN">⚡ Electrician</option>
                    <option value="PAINTER">🎨 Painter</option><option value="LABOURER">💪 Labourer</option>
                    <option value="PLUMBER">🔧 Plumber</option><option value="CARPENTER">🪚 Carpenter</option>
                    <option value="WELDER">🔥 Welder</option>
                </select>
                <input type="text" id="filterCity" class="form-input" style="max-width: 170px;" placeholder="Location..." onkeyup="if(event.key === 'Enter') loadJobs()">
                <button class="location-btn" onclick="fillCurrentLocation('filterCity')" data-i18n="use_my_location">📍 Use My Location</button>
                <button class="btn btn-sm btn-danger" onclick="document.getElementById('filterSkill').value='';document.getElementById('filterCity').value='';loadJobs()" data-i18n="clear_filters">Clear</button>
            </div>
            <div class="jobs-grid" id="jobsList"></div>
        </div>

        <!-- Tab: Applications -->
        <div class="tab-content" id="tab-applications"><div id="applicationsList"></div></div>

        <!-- Tab: History -->
        <div class="tab-content" id="tab-history"><div id="historyList"></div></div>
    </div>

    <!-- Rate Contractor Modal -->
    <div class="modal-overlay" id="rateContractorModal">
        <div class="modal">
            <div class="modal-header"><h2>⭐ <span data-i18n="rate_contractor">Rate Contractor</span></h2><button class="modal-close" onclick="closeModal('rateContractorModal')">✕</button></div>
            <input type="hidden" id="rcWorkHistoryId">
            <div style="text-align: center; margin: 14px 0;">
                <div id="rcStars" style="font-size: 2.4rem; cursor: pointer;">
                    <span class="star" data-value="1" onclick="setRCRating(1)">★</span><span class="star" data-value="2" onclick="setRCRating(2)">★</span>
                    <span class="star" data-value="3" onclick="setRCRating(3)">★</span><span class="star" data-value="4" onclick="setRCRating(4)">★</span>
                    <span class="star" data-value="5" onclick="setRCRating(5)">★</span>
                </div>
            </div>
            <div class="form-group"><label>Note</label><input type="text" id="rcNote" class="form-input" placeholder="e.g. Great contractor, paid on time"></div>
            <button class="btn btn-primary" style="width: 100%;" onclick="submitContractorRating()" data-i18n="submit_rating">Submit Rating</button>
        </div>
    </div>

    <!-- Voice FAB -->
    <button class="voice-fab" id="voiceFab" onclick="toggleVoice()" title="Voice Commands">🎤</button>

    <script src="/js/app.js"></script>
    <script>
        const user = requireAuth();
        if (user && user.role !== 'WORKER') window.location.href = '/contractor-dashboard.html';

        let currentJobs = [];
        let rcRating = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            renderNavbar('dashboard');
            if (!user) return;

            document.getElementById('userAvatar').textContent = getInitials(user.name);
            document.getElementById('welcomeMsg').innerHTML = `${t('welcome')}, ${user.name.split(' ')[0]}! 👋`;
            const sk = SKILL_MAP[user.primarySkill];
            document.getElementById('userMeta').textContent = `${sk ? sk.icon + ' ' + sk.name : ''} • ${user.city} • ⭐ ${(user.averageRating || 0).toFixed(1)}/5`;

            initVoiceNav();
            await Promise.all([loadStats(), loadJobs(), loadUrgentJobs()]);
        });

        // ===== Stats =====
        async function loadStats() {
            const appsRes = await api(`/jobs/applications/worker/${user.id}`);
            const histRes = await api(`/work-history/worker/${user.id}`);
            const apps = appsRes.success ? appsRes.data : [];
            const hist = histRes.success ? histRes.data : [];
            const pending = apps.filter(a => a.status === 'APPLIED').length;
            const selected = apps.filter(a => a.status === 'SELECTED').length;

            // Update dashboard card badges
            if (pending + selected > 0) {
                const badge = document.getElementById('appsBadge');
                if (badge) { badge.style.display = 'flex'; badge.textContent = pending + selected; }
            }

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-icon" style="background: rgba(96,165,250,0.12);">📋</div><div class="stat-value" style="color: #60A5FA;">${pending}</div><div class="stat-label" data-i18n="pending_applications">Pending</div></div>
                <div class="stat-card"><div class="stat-icon" style="background: rgba(16,185,129,0.12);">✅</div><div class="stat-value" style="color: #34D399;">${selected}</div><div class="stat-label" data-i18n="selected_jobs">Selected</div></div>
                <div class="stat-card"><div class="stat-icon" style="background: rgba(99,102,241,0.12);">🏆</div><div class="stat-value" style="color: #818CF8;">${hist.length}</div><div class="stat-label" data-i18n="jobs_completed">Completed</div></div>
                <div class="stat-card"><div class="stat-icon" style="background: rgba(255,184,0,0.12);">⭐</div><div class="stat-value" style="color: var(--warning);">${(user.averageRating || 0).toFixed(1)}</div><div class="stat-label" data-i18n="average_rating">Rating</div></div>
            `;
            applyTranslations();
        }

        // ===== Urgent Jobs Banner =====
        async function loadUrgentJobs() {
            const result = await api('/jobs/open?');
            const allJobs = result.success ? result.data : [];
            const urgents = allJobs.filter(j => j.urgentFlag);
            if (urgents.length > 0) {
                document.getElementById('urgentBanner').style.display = 'block';
                document.getElementById('urgentJobsList').innerHTML = urgents.slice(0, 3).map(j => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(239,68,68,0.08);">
                        <div><strong>${j.title}</strong> <span style="color: var(--text-muted);">• ${j.location} • ${formatCurrency(j.dailyRate)}/day</span></div>
                        <button class="btn btn-sm btn-primary" onclick="applyToJob(${j.id})">Apply</button>
                    </div>
                `).join('');
            }
        }

        // ===== Tabs =====
        function switchTab(tabName) {
            // Show tab bar & content
            document.getElementById('tabBar').style.display = 'flex';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const map = { browse: 0, applications: 1, history: 2 };
            const tabs = document.querySelectorAll('.tab');
            if (map[tabName] !== undefined && tabs[map[tabName]]) tabs[map[tabName]].classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            if (tabName === 'applications') loadApplications();
            if (tabName === 'history') loadHistory();
            if (tabName === 'browse') loadJobs();
        }

        // ===== Jobs =====
        async function loadJobs() {
            const skill = document.getElementById('filterSkill')?.value || '';
            const city = document.getElementById('filterCity')?.value || '';
            let url = '/jobs/open?';
            if (skill) url += `skill=${skill}&`;
            if (city) url += `location=${city}&`;
            const result = await api(url);
            currentJobs = result.success ? result.data : [];
            if (currentJobs.length === 0) {
                document.getElementById('jobsList').innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">🔍</div><h3 data-i18n="no_jobs_found">No jobs found</h3><p>Try adjusting filters</p></div>`;
                applyTranslations(); return;
            }
            document.getElementById('jobsList').innerHTML = currentJobs.map((job, idx) => `
                <div class="job-card">
                    ${job.urgentFlag ? '<div class="urgent-badge">🔥 URGENT</div>' : ''}
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 6px;">
                        <div class="job-title">${job.title}</div>
                        ${statusBadge(job.status)}
                    </div>
                    <div class="job-meta">
                        ${skillDisplay(job.skillRequired)}
                        <span class="job-meta-item">📍 ${job.location}</span>
                        <span class="job-meta-item">💰 ${formatCurrency(job.dailyRate)}/day</span>
                    </div>
                    <div class="job-meta">
                        <span class="job-meta-item">⏱️ ${job.durationDays || '?'} days</span>
                        <span class="job-meta-item">👷 ${job.numberOfWorkersNeeded} needed</span>
                    </div>
                    ${job.description ? `<p style="color: var(--text-muted); font-size: 0.86rem; margin: 6px 0;">${job.description}</p>` : ''}
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--glass-border);">
                        <span style="color: var(--text-muted); font-size: 0.8rem;">By: ${job.contractorName}</span>
                        <button class="btn btn-sm btn-primary" onclick="applyToJob(${job.id})" data-i18n="apply_now">Apply</button>
                    </div>
                </div>
            `).join('');
        }

        function applyToJobByIndex(index) { if (index >= 0 && index < currentJobs.length) applyToJob(currentJobs[index].id); else speakBack('Invalid job number'); }

        async function applyToJob(jobId) {
            const result = await api(`/jobs/${jobId}/apply?workerId=${user.id}`, { method: 'POST' });
            if (result.success) { showToast('Applied! 🎉', 'success'); loadJobs(); loadStats(); }
            else showToast(result.message || 'Failed to apply', 'error');
        }

        // ===== Applications =====
        async function loadApplications() {
            const result = await api(`/jobs/applications/worker/${user.id}`);
            const apps = result.success ? result.data : [];
            if (apps.length === 0) {
                document.getElementById('applicationsList').innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3 data-i18n="no_applications">No applications yet</h3></div>`;
                applyTranslations(); return;
            }
            document.getElementById('applicationsList').innerHTML = apps.map(app => `
                <div class="glass-card" style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <div><strong>Job #${app.jobId}</strong> ${statusBadge(app.status)}<div style="color: var(--text-muted); font-size: 0.82rem; margin-top: 3px;">${formatDate(app.appliedAt)}</div></div>
                </div>
            `).join('');
        }

        // ===== History =====
        async function loadHistory() {
            const result = await api(`/work-history/worker/${user.id}`);
            const history = result.success ? result.data : [];
            if (history.length === 0) {
                document.getElementById('historyList').innerHTML = `<div class="empty-state"><div class="empty-icon">📜</div><h3 data-i18n="no_history">No completed jobs yet</h3></div>`;
                applyTranslations(); return;
            }
            document.getElementById('historyList').innerHTML = history.map(wh => `
                <div class="wh-card">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;">
                        <div><div style="font-weight: 600; font-size: 1.02rem;">${wh.jobTitle || 'Job #' + wh.jobId}</div><div style="color: var(--text-muted); font-size: 0.86rem; margin-top: 3px;">${skillDisplay(wh.skillUsed)} • 📍 ${wh.location} • ${wh.contractorName}</div></div>
                        <div style="font-size: 0.8rem; color: var(--text-muted);">${formatDate(wh.startDate)} — ${formatDate(wh.endDate)}</div>
                    </div>
                    ${wh.photos ? `<div class="photo-preview" style="margin-top: 10px;">${wh.photos.split(',').map(p => `<img src="${p}" class="photo-thumb-lg" onclick="window.open('${p}','_blank')">`).join('')}</div>` : ''}
                    <div style="display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap;">
                        <div><span style="color: var(--text-muted); font-size: 0.8rem;">Rating:</span> ${wh.contractorRated ? `${renderStars(wh.workerRating)} ${wh.workerRating}/5` : '<span style="color: var(--text-muted);">Pending</span>'}</div>
                        <div>${!wh.workerRated ? `<button class="btn btn-sm btn-primary" onclick="openRCModal(${wh.id})">⭐ Rate</button>` : `You rated: ${renderStars(wh.contractorRating)}`}</div>
                    </div>
                </div>
            `).join('');
        }

        // ===== Rate Contractor =====
        function openRCModal(whId) { document.getElementById('rcWorkHistoryId').value = whId; rcRating = 0; updateRCStars(); document.getElementById('rcNote').value = ''; openModal('rateContractorModal'); }
        function setRCRating(v) { rcRating = v; updateRCStars(); }
        function updateRCStars() { document.querySelectorAll('#rcStars .star').forEach(s => s.classList.toggle('filled', parseInt(s.dataset.value) <= rcRating)); }
        async function submitContractorRating() {
            if (rcRating === 0) { showToast('Please select a rating', 'error'); return; }
            const result = await api('/work-history/rate-contractor', { method: 'POST', body: { workHistoryId: parseInt(document.getElementById('rcWorkHistoryId').value), raterId: user.id, rating: rcRating, note: document.getElementById('rcNote').value.trim() } });
            if (result.success) { showToast('Rated! 🙏', 'success'); closeModal('rateContractorModal'); loadHistory(); }
            else showToast(result.message || 'Failed', 'error');
        }
    </script>
</body>
</html>
