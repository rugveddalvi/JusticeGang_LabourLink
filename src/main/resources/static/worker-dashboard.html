<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard — LabourLink</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .dashboard-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; animation: fadeUp 0.5s ease; flex-wrap: wrap; }
        .welcome-text h2 { font-size: 1.8rem; font-weight: 700; }
        .welcome-text p { color: var(--text-muted); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeUp 0.4s ease; }
        .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        .job-title { font-weight: 600; font-size: 1.1rem; }
        .job-meta { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; align-items: center; }
        .job-meta-item { display: flex; align-items: center; gap: 5px; color: var(--text-secondary); font-size: 0.88rem; }
        .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
        @media (max-width: 640px) { .jobs-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <header class="navbar" id="navbar"></header>

    <div class="page-container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="avatar avatar-lg" style="background: var(--gradient-accent);" id="userAvatar">?</div>
            <div class="welcome-text">
                <h2 id="welcomeMsg"><span data-i18n="welcome">Welcome</span>! 👋</h2>
                <p id="userMeta">Loading...</p>
            </div>
        </div>

        <!-- Icon Navigation (Accessibility) -->
        <div class="icon-nav" id="iconNav">
            <div class="icon-nav-item" onclick="switchTab('browse')">
                <div>🔍</div>
                <span data-i18n="browse_jobs">Browse Jobs</span>
            </div>
            <div class="icon-nav-item" onclick="switchTab('applications')">
                <div>📋</div>
                <span data-i18n="my_applications">My Applications</span>
            </div>
            <div class="icon-nav-item" onclick="switchTab('history')">
                <div>📜</div>
                <span data-i18n="work_history">Work History</span>
            </div>
            <div class="icon-nav-item" onclick="window.location.href='/worker-profile.html?id=' + user.id">
                <div>👤</div>
                <span data-i18n="profile">Profile</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid-4 mb-3" id="statsGrid" style="animation: fadeUp 0.5s ease 0.15s both;"></div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('browse')" data-i18n="browse_jobs">🔍 Browse Jobs</button>
            <button class="tab" onclick="switchTab('applications')" data-i18n="my_applications">📋 My Applications</button>
            <button class="tab" onclick="switchTab('history')" data-i18n="work_history">📜 Work History</button>
        </div>

        <!-- Tab: Browse Jobs -->
        <div class="tab-content active" id="tab-browse">
            <div class="filter-bar">
                <select id="filterSkill" class="form-input" style="max-width: 180px;" onchange="loadJobs()">
                    <option value="" data-i18n="all_skills">All Skills</option>
                    <option value="MASON">🧱 Mason</option>
                    <option value="ELECTRICIAN">⚡ Electrician</option>
                    <option value="PAINTER">🎨 Painter</option>
                    <option value="LABOURER">💪 Labourer</option>
                    <option value="PLUMBER">🔧 Plumber</option>
                    <option value="CARPENTER">🪚 Carpenter</option>
                    <option value="WELDER">🔥 Welder</option>
                </select>
                <select id="filterCity" class="form-input" style="max-width: 180px;" onchange="loadJobs()">
                    <option value="" data-i18n="all_cities">All Cities</option>
                    <option value="Mumbai">Mumbai</option><option value="Delhi">Delhi</option>
                    <option value="Bangalore">Bangalore</option><option value="Pune">Pune</option>
                    <option value="Hyderabad">Hyderabad</option><option value="Chennai">Chennai</option>
                    <option value="Kolkata">Kolkata</option><option value="Ahmedabad">Ahmedabad</option>
                </select>
                <button class="btn btn-sm btn-danger" onclick="document.getElementById('filterSkill').value='';document.getElementById('filterCity').value='';loadJobs()" data-i18n="clear_filters">Clear Filters</button>
            </div>
            <div class="jobs-grid" id="jobsList"></div>
        </div>

        <!-- Tab: Applications -->
        <div class="tab-content" id="tab-applications">
            <div id="applicationsList"></div>
        </div>

        <!-- Tab: History -->
        <div class="tab-content" id="tab-history">
            <div id="historyList"></div>
        </div>
    </div>

    <!-- Rate Contractor Modal -->
    <div class="modal-overlay" id="rateContractorModal">
        <div class="modal">
            <div class="modal-header">
                <h2>⭐ <span data-i18n="rate_contractor">Rate Contractor</span></h2>
                <button class="modal-close" onclick="closeModal('rateContractorModal')">✕</button>
            </div>
            <input type="hidden" id="rcWorkHistoryId">
            <div style="text-align: center; margin: 16px 0;">
                <div id="rcStars" style="font-size: 2.5rem; cursor: pointer;">
                    <span class="star" data-value="1" onclick="setRCRating(1)">★</span>
                    <span class="star" data-value="2" onclick="setRCRating(2)">★</span>
                    <span class="star" data-value="3" onclick="setRCRating(3)">★</span>
                    <span class="star" data-value="4" onclick="setRCRating(4)">★</span>
                    <span class="star" data-value="5" onclick="setRCRating(5)">★</span>
                </div>
            </div>
            <div class="form-group">
                <label>Note</label>
                <input type="text" id="rcNote" class="form-input" placeholder="e.g. Great contractor, paid on time">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="submitContractorRating()" data-i18n="submit_rating">Submit Rating</button>
        </div>
    </div>

    <!-- Voice FAB -->
    <button class="voice-fab" id="voiceFab" onclick="toggleVoice()" title="Voice Commands">🎤</button>

    <script src="/js/app.js"></script>
    <script>
        const user = requireAuth();
        if (user && user.role !== 'WORKER') window.location.href = '/contractor-dashboard.html';

        let currentJobs = [];
        let rcRating = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            renderNavbar('dashboard');
            if (!user) return;

            document.getElementById('userAvatar').textContent = getInitials(user.name);
            document.getElementById('welcomeMsg').innerHTML = `${t('welcome')}, ${user.name}! 👋`;
            const sk = SKILL_MAP[user.primarySkill];
            document.getElementById('userMeta').textContent = `${sk ? sk.icon + ' ' + sk.name : ''} • ${user.city} • Rating: ${(user.averageRating || 0).toFixed(1)}/5 (${user.totalRatings || 0} reviews)`;

            initVoiceNav();
            await Promise.all([loadStats(), loadJobs()]);
        });

        // ===== Stats =====
        async function loadStats() {
            const appsRes = await api(`/jobs/applications/worker/${user.id}`);
            const histRes = await api(`/work-history/worker/${user.id}`);
            const apps = appsRes.success ? appsRes.data : [];
            const hist = histRes.success ? histRes.data : [];

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(96,165,250,0.12);">📋</div>
                    <div class="stat-value" style="color: #60A5FA;">${apps.filter(a => a.status === 'APPLIED').length}</div>
                    <div class="stat-label" data-i18n="pending_applications">Pending Applications</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(16,185,129,0.12);">✅</div>
                    <div class="stat-value" style="color: #34D399;">${apps.filter(a => a.status === 'SELECTED').length}</div>
                    <div class="stat-label" data-i18n="selected_jobs">Selected Jobs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(99,102,241,0.12);">🏆</div>
                    <div class="stat-value" style="color: #818CF8;">${hist.length}</div>
                    <div class="stat-label" data-i18n="jobs_completed">Jobs Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(255,184,0,0.12);">⭐</div>
                    <div class="stat-value" style="color: var(--warning);">${(user.averageRating || 0).toFixed(1)}</div>
                    <div class="stat-label" data-i18n="average_rating">Average Rating</div>
                </div>
            `;
            applyTranslations();
        }

        // ===== Tabs =====
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            // Find matching tab button
            const tabs = document.querySelectorAll('.tab');
            const map = { browse: 0, applications: 1, history: 2 };
            if (map[tabName] !== undefined && tabs[map[tabName]]) tabs[map[tabName]].classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            if (tabName === 'applications') loadApplications();
            if (tabName === 'history') loadHistory();
            if (tabName === 'browse') loadJobs();
        }

        // ===== Load Jobs =====
        async function loadJobs() {
            const skill = document.getElementById('filterSkill').value;
            const city = document.getElementById('filterCity').value;
            let url = '/jobs/open?';
            if (skill) url += `skill=${skill}&`;
            if (city) url += `location=${city}&`;

            const result = await api(url);
            currentJobs = result.success ? result.data : [];

            if (currentJobs.length === 0) {
                document.getElementById('jobsList').innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">🔍</div><h3 data-i18n="no_jobs_found">No jobs found</h3><p>Try adjusting filters</p></div>`;
                applyTranslations();
                return;
            }

            document.getElementById('jobsList').innerHTML = currentJobs.map((job, idx) => `
                <div class="job-card" id="jobCard${idx}">
                    ${job.urgentFlag ? '<div class="urgent-badge">🔥 URGENT</div>' : ''}
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;">
                        <div class="job-title">${job.title}</div>
                        ${statusBadge(job.status)}
                    </div>
                    <div class="job-meta">
                        ${skillDisplay(job.skillRequired)}
                        <span class="job-meta-item">📍 ${job.location}</span>
                    </div>
                    <div class="job-meta">
                        <span class="job-meta-item">💰 ${formatCurrency(job.dailyRate)}${t('per_day')}</span>
                        <span class="job-meta-item">⏱️ ${job.durationDays || '?'} ${t('days')}</span>
                        <span class="job-meta-item">👷 ${job.numberOfWorkersNeeded} ${t('needed')}</span>
                    </div>
                    ${job.description ? `<p style="color: var(--text-muted); font-size: 0.88rem; margin: 8px 0;">${job.description}</p>` : ''}
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--glass-border);">
                        <span style="color: var(--text-muted); font-size: 0.82rem;">${t('posted_by')}: ${job.contractorName}</span>
                        <button class="btn btn-sm btn-primary" onclick="applyToJob(${job.id})" data-i18n="apply_now">Apply Now</button>
                    </div>
                </div>
            `).join('');

            // Voice response
            if (currentJobs.length > 0 && isListening) {
                speakBack(`You have ${currentJobs.length} jobs available. Job 1: ${currentJobs[0].title} at ${currentJobs[0].location}.`);
            }
        }

        // Voice: Apply by index
        function applyToJobByIndex(index) {
            if (index >= 0 && index < currentJobs.length) {
                applyToJob(currentJobs[index].id);
            } else {
                speakBack('Invalid job number');
            }
        }

        async function applyToJob(jobId) {
            const result = await api(`/jobs/${jobId}/apply?workerId=${user.id}`, { method: 'POST' });
            if (result.success) {
                showToast('Applied! 🎉', 'success');
                loadJobs();
                loadStats();
            } else {
                showToast(result.message || 'Failed to apply', 'error');
            }
        }

        // ===== Applications =====
        async function loadApplications() {
            const result = await api(`/jobs/applications/worker/${user.id}`);
            const apps = result.success ? result.data : [];

            if (apps.length === 0) {
                document.getElementById('applicationsList').innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3 data-i18n="no_applications">No applications yet</h3></div>`;
                applyTranslations(); return;
            }

            document.getElementById('applicationsList').innerHTML = apps.map(app => `
                <div class="glass-card" style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                    <div>
                        <strong>Job #${app.jobId}</strong>
                        <span style="margin-left: 12px;">${statusBadge(app.status)}</span>
                        <div style="color: var(--text-muted); font-size: 0.85rem; margin-top: 4px;">
                            Applied ${formatDate(app.appliedAt)}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ===== Work History =====
        async function loadHistory() {
            const result = await api(`/work-history/worker/${user.id}`);
            const history = result.success ? result.data : [];

            if (history.length === 0) {
                document.getElementById('historyList').innerHTML = `<div class="empty-state"><div class="empty-icon">📜</div><h3 data-i18n="no_history">No completed jobs yet</h3></div>`;
                applyTranslations(); return;
            }

            document.getElementById('historyList').innerHTML = history.map(wh => `
                <div class="glass-card" style="margin-bottom: 16px;">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
                        <div>
                            <div style="font-weight: 600; font-size: 1.05rem;">${wh.jobTitle || 'Job #' + wh.jobId}</div>
                            <div style="color: var(--text-muted); font-size: 0.88rem; margin-top: 4px;">
                                ${skillDisplay(wh.skillUsed)} • 📍 ${wh.location} • Contractor: ${wh.contractorName}
                            </div>
                        </div>
                        <div style="font-size: 0.82rem; color: var(--text-muted);">${formatDate(wh.startDate)} — ${formatDate(wh.endDate)}</div>
                    </div>
                    ${wh.photos ? `<div class="photo-preview" style="margin-top: 12px;">${wh.photos.split(',').map(p => `<img src="${p}" class="photo-thumb-lg" onclick="window.open('${p}','_blank')">`).join('')}</div>` : ''}
                    <div style="display: flex; gap: 24px; margin-top: 14px; flex-wrap: wrap;">
                        <div>
                            <span style="color: var(--text-muted); font-size: 0.82rem;">Contractor rated you:</span>
                            ${wh.contractorRated ? `<div>${renderStars(wh.workerRating)} ${wh.workerRating}/5</div>` : '<div style="color: var(--text-muted);">Pending</div>'}
                        </div>
                        <div>
                            <span style="color: var(--text-muted); font-size: 0.82rem;">You rated contractor:</span>
                            ${wh.workerRated ? `<div>${renderStars(wh.contractorRating)} ${wh.contractorRating}/5</div>` : `<div><button class="btn btn-sm btn-primary" onclick="openRCModal(${wh.id})">⭐ ${t('rate_contractor')}</button></div>`}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ===== Rate Contractor =====
        function openRCModal(whId) {
            document.getElementById('rcWorkHistoryId').value = whId;
            rcRating = 0; updateRCStars();
            document.getElementById('rcNote').value = '';
            openModal('rateContractorModal');
        }

        function setRCRating(v) { rcRating = v; updateRCStars(); }

        function updateRCStars() {
            document.querySelectorAll('#rcStars .star').forEach(s => {
                s.classList.toggle('filled', parseInt(s.dataset.value) <= rcRating);
            });
        }

        async function submitContractorRating() {
            if (rcRating === 0) { showToast('Please select a rating', 'error'); return; }
            const result = await api('/work-history/rate-contractor', {
                method: 'POST',
                body: {
                    workHistoryId: parseInt(document.getElementById('rcWorkHistoryId').value),
                    raterId: user.id,
                    rating: rcRating,
                    note: document.getElementById('rcNote').value.trim()
                }
            });
            if (result.success) {
                showToast('Contractor rated! 🙏', 'success');
                closeModal('rateContractorModal');
                loadHistory();
            } else {
                showToast(result.message || 'Failed', 'error');
            }
        }
    </script>
</body>
</html>
