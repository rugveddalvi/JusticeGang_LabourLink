<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Profile — LabourLink</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .profile-header { display: flex; gap: 32px; align-items: flex-start; padding: 40px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); margin-bottom: 32px; animation: fadeUp 0.5s ease; flex-wrap: wrap; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 28px; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 700; color: white; flex-shrink: 0; box-shadow: 0 8px 30px rgba(255,107,53,0.3); }
        .profile-info h1 { font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
        .profile-info .subtitle { color: var(--text-secondary); font-size: 1rem; margin-bottom: 16px; }
        .profile-stats { display: flex; gap: 32px; flex-wrap: wrap; }
        .profile-stat { text-align: center; }
        .profile-stat .value { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .profile-stat .label { color: var(--text-muted); font-size: 0.85rem; }
        .endorsements-section, .history-section { margin-bottom: 32px; }
        .endorsements-section h2, .history-section h2 { font-size: 1.3rem; margin-bottom: 16px; }
        .endorsements-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .wh-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; transition: all 0.3s; }
        .wh-card:hover { border-color: rgba(0,201,167,0.2); }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <header class="navbar" id="navbar"></header>

    <div class="page-container">
        <div class="profile-header" id="profileHeader"><div class="spinner"></div></div>
        <div class="endorsements-section" id="endorsementsSection"></div>
        <div class="history-section" id="historySection"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const workerId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            renderNavbar('profile');
            if (!workerId) { document.getElementById('profileHeader').innerHTML = `<div class="empty-state"><h3>No worker specified</h3></div>`; return; }
            await Promise.all([loadProfile(), loadEndorsements(), loadWorkHistory()]);
        });

        async function loadProfile() {
            const result = await api(`/users/${workerId}`);
            if (!result.success) { document.getElementById('profileHeader').innerHTML = `<div class="empty-state"><h3>Worker not found</h3></div>`; return; }
            const w = result.data;
            document.title = `${w.name} — LabourLink`;
            const histRes = await api(`/work-history/worker/${workerId}`);
            const histCount = histRes.success ? histRes.data.length : 0;
            document.getElementById('profileHeader').innerHTML = `
                <div class="profile-avatar">${getInitials(w.name)}</div>
                <div class="profile-info">
                    <h1>${w.name}</h1>
                    <div class="subtitle">${skillDisplay(w.primarySkill)} &nbsp;•&nbsp; 📍 ${w.city || 'N/A'} &nbsp;•&nbsp; Member since ${formatDate(w.createdAt)}</div>
                    <div class="profile-stats">
                        <div class="profile-stat"><div class="value" style="color: var(--warning);">${(w.averageRating || 0).toFixed(1)}</div><div class="label">${renderStars(w.averageRating)} (${w.totalRatings || 0} reviews)</div></div>
                        <div class="profile-stat"><div class="value" style="color: var(--accent);">${histCount}</div><div class="label" data-i18n="jobs_completed">Jobs Completed</div></div>
                    </div>
                </div>
            `;
            applyTranslations();
        }

        async function loadEndorsements() {
            const result = await api(`/work-history/endorsements/worker/${workerId}`);
            const endorsements = result.success ? result.data : [];
            if (endorsements.length === 0) {
                document.getElementById('endorsementsSection').innerHTML = `<h2>🏷️ <span data-i18n="feature_endorsements">Skill Endorsements</span></h2><p style="color: var(--text-muted);">No endorsements yet</p>`;
                applyTranslations(); return;
            }
            const grouped = {};
            endorsements.forEach(e => { if (!grouped[e.skillTag]) grouped[e.skillTag] = { count: 0, contractors: [] }; grouped[e.skillTag].count++; grouped[e.skillTag].contractors.push(e.contractorName); });
            document.getElementById('endorsementsSection').innerHTML = `
                <h2>🏷️ Skill Endorsements (${endorsements.length})</h2>
                <div class="endorsements-grid">
                    ${Object.entries(grouped).map(([tag, data]) => `
                        <span class="endorsement-tag" title="By: ${data.contractors.join(', ')}">✅ ${tag} <span style="background: rgba(0,201,167,0.2); padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; margin-left: 4px;">${data.count}</span></span>
                    `).join('')}
                </div>
            `;
        }

        async function loadWorkHistory() {
            const result = await api(`/work-history/worker/${workerId}`);
            const history = result.success ? result.data : [];
            if (history.length === 0) {
                document.getElementById('historySection').innerHTML = `<h2>📜 <span data-i18n="work_history">Verified Work History</span></h2><p style="color: var(--text-muted);">No completed jobs yet</p>`;
                applyTranslations(); return;
            }
            // Get endorsements per workHistory
            const endorseRes = await api(`/work-history/endorsements/worker/${workerId}`);
            const allEndorsements = endorseRes.success ? endorseRes.data : [];
            const endorseByWh = {};
            allEndorsements.forEach(e => { if (!endorseByWh[e.workHistoryId]) endorseByWh[e.workHistoryId] = []; endorseByWh[e.workHistoryId].push(e); });

            document.getElementById('historySection').innerHTML = `
                <h2>📜 Verified Work History (${history.length})</h2>
                ${history.map(wh => `
                    <div class="wh-card">
                        <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
                            <div>
                                <div style="font-weight: 600; font-size: 1.05rem;">${wh.jobTitle || 'Job #' + wh.jobId}</div>
                                <div style="color: var(--text-muted); font-size: 0.88rem; margin-top: 4px;">${skillDisplay(wh.skillUsed)} • 📍 ${wh.location || 'N/A'} • Contractor: ${wh.contractorName}</div>
                            </div>
                            <div style="font-size: 0.82rem; color: var(--text-muted);">${formatDate(wh.startDate)} — ${formatDate(wh.endDate)}</div>
                        </div>
                        ${wh.photos ? `<div class="photo-preview" style="margin-top: 12px;">${wh.photos.split(',').map(p => `<img src="${p}" class="photo-thumb-lg" onclick="window.open('${p}','_blank')">`).join('')}</div>` : ''}
                        ${wh.contractorRated ? `
                        <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--glass-border);">
                            <span style="color: var(--text-muted); font-size: 0.82rem;">Rating:</span>
                            <span style="margin-left: 8px;">${renderStars(wh.workerRating)} <strong style="color: var(--warning);">${wh.workerRating}/5</strong></span>
                            ${wh.workerNote ? `<div style="color: var(--text-secondary); font-size: 0.88rem; margin-top: 6px; font-style: italic;">"${wh.workerNote}"</div>` : ''}
                        </div>` : ''}
                        ${endorseByWh[wh.id] ? `
                        <div style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px;">
                            ${endorseByWh[wh.id].map(e => `<span class="endorsement-tag">✅ ${e.skillTag}</span>`).join('')}
                        </div>` : ''}
                    </div>
                `).join('')}
            `;
        }
    </script>
</body>
</html>
